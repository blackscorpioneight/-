
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سبحة إلكترونية</title>
    <link rel="stylesheet" href="m.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="header">
        <h1>المسبحة الإلكترونية</h1>
    </div>

    <div id="nav">
         <a href="index.html.html" class="active">الرئيسية</a>
        <a href="sabh.html">أذكار الصباح</a>
        <a href="masa.html">أذكار المساء</a>
        <a href="quran.html">القرآن الكريم</a>
    
    </div>
<div class="conrainer-wrapper">
    <div class="container">
        <h2>سبحة الأذكار الإلكترونية</h2>
        
        <div class="counter-container">
            <div id="counter">0</div>
            
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            
            <div class="target-container">
                <label for="target-input">الهدف:</label>
                <input type="number" id="target-input" value="33" min="1">
            </div>
            
            <div class="buttons">
                <button id="increase" onclick="increaseCount()">تسبيح (+1)</button>
                <button id="auto-count" onclick="toggleAutoCount()">التسبيح التلقائي</button>
                <button id="reset" onclick="resetCount()">إعادة ضبط</button>
            </div>
        </div>
    </div>
</div>
    <div id="footer">
        <p>Made with ❤️ by Black Scorpion</p>
    </div>

    <div id="congrats-modal" class="congrats-modal">
        <div class="congrats-content">
            <h3>مبروك! 🎉</h3>
            <p id="congrats-message"></p>
            <button class="congrats-btn" onclick="closeCongrats()">حسناً</button>
        </div>
    </div>

    <script>
        let count = 0;
        let target = 33;
        let autoCountInterval = null;
        let isAutoCounting = false;
        const counterElement = document.getElementById("counter");
        const progressBar = document.getElementById("progress-bar");
        const targetInput = document.getElementById("target-input");
        const autoCountBtn = document.getElementById("auto-count");

        
        targetInput.addEventListener('change', function() {
            target = parseInt(this.value) || 33;
            updateProgress();
        });

        function vibrateButton(button) {
            button.classList.add("vibrate");
            setTimeout(() => {
                button.classList.remove("vibrate");
            }, 300);
        }

        function increaseCount() {
            const button = document.getElementById("increase");
            vibrateButton(button);
            
            count++;
            counterElement.textContent = count;
            counterElement.classList.add("animation");
            
            setTimeout(() => {
                counterElement.classList.remove("animation");
            }, 500);
            
            updateProgress();
            
            if (count === target) {
                setTimeout(showCongrats, 300);
            }
        }

        function toggleAutoCount() {
            const button = document.getElementById("auto-count");
            vibrateButton(button);
            
            if (isAutoCounting) {
                stopAutoCount();
                button.textContent = "التسبيح التلقائي";
            } else {
                startAutoCount();
                button.textContent = "إيقاف التلقائي";
            }
            isAutoCounting = !isAutoCounting;
        }

        function startAutoCount() {
            autoCountInterval = setInterval(() => {
                if (count < target) {
                    increaseCount();
                } else {
                    stopAutoCount();
                    autoCountBtn.textContent = "التسبيح التلقائي";
                    isAutoCounting = false;
                }
            }, 500);
        }

        function stopAutoCount() {
            clearInterval(autoCountInterval);
        }

        function resetCount() {
            const button = document.getElementById("reset");
            vibrateButton(button);
            
            count = 0;
            counterElement.textContent = count;
            updateProgress();
            
            if (isAutoCounting) {
                stopAutoCount();
                autoCountBtn.textContent = "التسبيح التلقائي";
                isAutoCounting = false;
            }
        }

        function updateProgress() {
            const progress = Math.min((count / target) * 100, 100);
            progressBar.style.width = progress + "%";
        }

        function showCongrats() {
            const modal = document.getElementById('congrats-modal');
            const message = document.getElementById('congrats-message');
            message.textContent = `تهانينا! لقد أكملت ${target} تسبيحة`;
            modal.style.display = 'flex';
        }

        function closeCongrats() {
            document.getElementById('congrats-modal').style.display = 'none';
        }
    </script>

</body>
</html>
